<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fanorona 3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Menu de sélection de mode -->
  <div id="modeMenu" class="mode-menu active">
    <div class="mode-modal">
      <h1>Fanorona <span class="highlight">3</span></h1>
      <p>Sélectionnez le mode de jeu</p>
      <div class="mode-buttons">
        <button class="mode-btn hvh-btn" data-mode="hvh">
          <span class="mode-icon"><svg viewBox="0 0 24 24" width="1.5em" height="1.5em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="8" r="3.5"/><circle cx="16" cy="8" r="3.5"/><path d="M2 22c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 16c3.3 0 6 2.7 6 6"/></svg></span>
          <span class="mode-name">Humain vs Humain</span>
        </button>
        <button class="mode-btn hvai-btn" data-mode="hvai-easy">
          <span class="mode-icon"><svg viewBox="0 0 24 24" width="1.5em" height="1.5em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="7" width="14" height="12" rx="2"/><circle cx="9" cy="12" r="1.5" fill="currentColor"/><circle cx="15" cy="12" r="1.5" fill="currentColor"/><path d="M9 16c1 .5 3 .5 4 0"/><rect x="11" y="5" width="2" height="3"/></svg></span>
          <span class="mode-name">vs IA Facile</span>
        </button>
        <button class="mode-btn hvai-btn" data-mode="hvai-hard">
          <span class="mode-icon"><svg viewBox="0 0 24 24" width="1.5em" height="1.5em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12,2 15,9 22,9 16,14 18,22 12,17 6,22 8,14 2,9 9,9"/></svg></span>
          <span class="mode-name">vs IA Difficile</span>
        </button>
        <button class="mode-btn aivai-btn" data-mode="aivai-easy">
          <span class="mode-icon"><svg viewBox="0 0 24 24" width="1.5em" height="1.5em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2.5" y="8" width="8" height="10" rx="1.5"/><rect x="13.5" y="8" width="8" height="10" rx="1.5"/><circle cx="5.5" cy="12" r="1" fill="currentColor"/><circle cx="7.5" cy="12" r="1" fill="currentColor"/><circle cx="16.5" cy="12" r="1" fill="currentColor"/><circle cx="18.5" cy="12" r="1" fill="currentColor"/><rect x="5.5" y="6" width="2" height="2.5"/><rect x="16.5" y="6" width="2" height="2.5"/></svg></span>
          <span class="mode-name">IA Facile vs IA Facile</span>
        </button>
        <button class="mode-btn aivai-btn" data-mode="aivai-hard">
          <span class="mode-icon"><svg viewBox="0 0 24 24" width="1.5em" height="1.5em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="6,3 7.5,7.5 12,7.5 8.5,10.5 10,15 6,12 2,15 3.5,10.5 0,7.5 4.5,7.5"/><polygon points="18,3 19.5,7.5 24,7.5 20.5,10.5 22,15 18,12 14,15 15.5,10.5 12,7.5 16.5,7.5"/></svg></span>
          <span class="mode-name">IA Difficile vs IA Difficile</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Plateau de jeu -->
  <div id="gameBoard" class="game-board-hidden">
    <div class="game-container">
      <header class="game-header">
        <h1>Fanorona <span class="highlight">3</span></h1>
      </header>

      <div class="game-bar">
        <div class="player-info active" data-player="1">
          <span class="player-dot p1"></span>
          <span class="player-name" id="p1Name">Joueur 1</span>
          <span class="piece-count" id="count1">0/3</span>
        </div>
        <div class="phase-badge" id="phaseBadge">Placement</div>
        <div class="player-info" data-player="2">
          <span class="player-dot p2"></span>
          <span class="player-name" id="p2Name">Joueur 2</span>
          <span class="piece-count" id="count2">0/3</span>
        </div>
      </div>

      <div class="board-wrapper">
        <svg class="board-lines" viewBox="0 0 200 200" >
          <line x1="33.33" y1="33.33" x2="100" y2="33.33" />
          <line x1="100" y1="33.33" x2="166.67" y2="33.33" />
          <line x1="33.33" y1="100" x2="100" y2="100" />
          <line x1="100" y1="100" x2="166.67" y2="100" />
          <line x1="33.33" y1="166.67" x2="100" y2="166.67" />
          <line x1="100" y1="166.67" x2="166.67" y2="166.67" />

          <line x1="33.33" y1="33.33" x2="33.33" y2="100" />
          <line x1="33.33" y1="100" x2="33.33" y2="166.67" />
          <line x1="100" y1="33.33" x2="100" y2="100" />
          <line x1="100" y1="100" x2="100" y2="166.67" />
          <line x1="166.67" y1="33.33" x2="166.67" y2="100" />
          <line x1="166.67" y1="100" x2="166.67" y2="166.67" />

          <line x1="33.33" y1="33.33" x2="100" y2="100" />
          <line x1="100" y1="100" x2="166.67" y2="166.67" />
          <line x1="166.67" y1="33.33" x2="100" y2="100" />
          <line x1="100" y1="100" x2="33.33" y2="166.67" />
        </svg>
        <div class="intersections" id="intersections"></div>
      </div>

      <div class="game-controls">
        <button class="undo-btn" id="undoBtn" title="Annuler (Ctrl+Z)">↶ Undo</button>
        <button class="redo-btn" id="redoBtn" title="Rétablir (Ctrl+Y)">↷ Redo</button>
      </div>

      <div class="game-footer">
        <p class="game-status" id="statusMsg">À vous de jouer, Joueur 1</p>
        <button class="reset-btn" id="resetBtn">Retour au Menu</button>
      </div>

      <div id="winOverlay" class="win-overlay">
        <div class="win-modal">
          <div class="win-trophy" id="winTrophy">
            <svg viewBox="0 0 24 24" width="3em" height="3em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 4h12v4c0 3-2 6-6 6s-6-3-6-6V4z"/>
              <path d="M6 4H4v2c0 2 1 4 2 4"/>
              <path d="M18 4h2v2c0 2-1 4-2 4"/>
              <path d="M9 16h6l-1 4h-4l-1-4z"/>
              <path d="M8 20h8"/>
            </svg>
          </div>
          <p class="win-text" id="winText">Joueur 1 a gagné !</p>
          <button class="reset-btn" id="winRestartBtn">Nouvelle Partie</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
